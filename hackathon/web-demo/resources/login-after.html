<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 — 替换后（ArchUI VI）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  /* ArchUI VI — 暖棕大地系 */
  --bg: #F5EDE4;
  --card: #FFF8F0;
  --card-elevated: #FFFDF8;
  --ink: #2C1B0C;
  --ink-light: #5E4832;
  --ink-muted: #8A725C;
  --accent: #C26100;
  --accent-dark: #9B4D00;
  --accent-soft: rgba(194, 97, 0, .06);
  --teal: #2F7886;
  --border: rgba(86, 57, 27, .12);
  --shadow: 0 20px 50px rgba(85, 55, 24, .14);
  --shadow-sm: 0 2px 8px rgba(85, 55, 24, .06);
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Lexend', 'Noto Sans SC', system-ui, sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}

/* 背景装饰光晕 */
body::before {
  content: '';
  position: fixed;
  top: -30%;
  right: -20%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(194, 97, 0, .06) 0%, transparent 70%);
  pointer-events: none;
}

body::after {
  content: '';
  position: fixed;
  bottom: -20%;
  left: -15%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(47, 120, 134, .05) 0%, transparent 70%);
  pointer-events: none;
}

.login-box {
  background: var(--card);
  border-radius: var(--radius);
  padding: 48px 40px;
  width: 420px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.5s ease-out;
}

/* 顶部渐变装饰条 */
.login-box::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--accent), var(--teal));
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-box h1 {
  font-family: 'Sora', 'Noto Sans SC', system-ui, sans-serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
  letter-spacing: -0.02em;
  line-height: 1.2;
}

.login-box p.sub {
  font-size: 15px;
  color: var(--ink-muted);
  margin-bottom: 32px;
  line-height: 1.6;
}

label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-light);
  margin-bottom: 6px;
  letter-spacing: 0.02em;
}

input {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 20px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card-elevated);
  font-family: 'Lexend', 'Noto Sans SC', system-ui, sans-serif;
  font-size: 15px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

input::placeholder {
  color: var(--ink-muted);
  font-weight: 300;
}

input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #FFF5E9;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Lexend', 'Noto Sans SC', system-ui, sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.01em;
  transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
  box-shadow: var(--shadow-sm);
}

.btn:hover {
  background: var(--accent-dark);
  transform: translateY(-1px);
}

.btn:active {
  transform: translateY(0);
}

.links {
  margin-top: 16px;
  text-align: center;
  font-size: 13px;
  color: var(--ink-muted);
}

.links a {
  color: var(--teal);
  text-decoration: none;
  font-weight: 500;
  transition: color 0.2s;
}

.links a:hover {
  color: var(--accent);
}

.divider {
  margin: 28px 0;
  border: none;
  height: 1px;
  background: var(--border);
}

.social {
  display: flex;
  gap: 10px;
}

.social button {
  flex: 1;
  padding: 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card-elevated);
  font-family: 'Lexend', 'Noto Sans SC', system-ui, sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-light);
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, transform 0.1s;
}

.social button:hover {
  border-color: var(--accent);
  background: var(--accent-soft);
  color: var(--accent);
  transform: translateY(-1px);
}

.footer-note {
  margin-top: 24px;
  font-size: 12px;
  color: var(--ink-muted);
  text-align: center;
}
</style>
</head>
<body>

<div class="login-box">
  <h1>用户登录</h1>
  <p class="sub">请输入您的账号信息</p>

  <label>邮箱地址</label>
  <input type="email" placeholder="your@email.com">

  <label>密码</label>
  <input type="password" placeholder="输入密码">

  <button class="btn">登 录</button>

  <div class="links">
    <a href="#">忘记密码?</a> · <a href="#">注册新账号</a>
  </div>

  <div class="divider"></div>

  <div class="social">
    <button>微信登录</button>
    <button>GitHub</button>
    <button>Google</button>
  </div>

  <div class="footer-note">登录即表示同意服务条款和隐私政策</div>
</div>

</body>
</html>
