name: CLI Release

on:
  push:
    tags:
      - 'cli-v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: cli/resources
        run: npm ci

      - name: Build
        working-directory: cli/resources
        run: npm run build

      - name: Test
        working-directory: cli/resources
        run: npm test

      - name: Smoke test — validate repo
        run: node cli/resources/dist/index.js validate .

      - name: Publish to npm
        working-directory: cli/resources
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
