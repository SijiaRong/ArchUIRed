<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Primary Module Card — ArchUI Component Preview</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg-base:      #11111b;
      --bg-mantle:    #181825;
      --bg-crust:     #1e1e2e;
      --bg-surface0:  #313244;
      --bg-surface1:  #45475a;
      --text:         #cdd6f4;
      --subtext1:     #bac2de;
      --subtext0:     #a6adc8;
      --overlay2:     #9399b2;
      --overlay1:     #7f849c;
      --overlay0:     #6c7086;
      --blue:         #89b4fa;
      --lavender:     #b4befe;
      --teal:         #94e2d5;
      --green:        #a6e3a1;
      --yellow:       #f9e2af;
      --peach:        #fab387;
      --red:          #f38ba8;
      --canvas-bg:    #0f0f17;
      --node-bg:      #1e1e2e;
      --node-border:  #45475a;
      --node-selected:#89b4fa;
      --blue-glow-sm: rgba(137,180,250,.15);
      --blue-glow-md: rgba(137,180,250,.25);
      --canvas-dot:   rgba(99,102,120,0.2);
      --radius-md:    10px;
      --radius-sm:    6px;
      --radius-xs:    4px;
      --shadow-md:    0 8px 24px rgba(0,0,0,.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--canvas-bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding: 40px 32px 80px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, var(--canvas-dot) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    .page-content {
      position: relative;
      z-index: 1;
      max-width: 1120px;
      margin: 0 auto;
    }

    .page-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--overlay0);
      margin-bottom: 5px;
    }

    .page-heading {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .page-sub {
      font-size: 13px;
      color: var(--overlay2);
      margin-bottom: 52px;
    }

    .section { margin-bottom: 60px; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--overlay0);
      border-bottom: 1px solid var(--bg-surface0);
      padding-bottom: 8px;
      margin-bottom: 24px;
    }

    .cards-row {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      align-items: flex-start;
    }

    .state-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .click-hint {
      font-size: 12px;
      color: var(--overlay0);
      margin-bottom: 20px;
      font-style: italic;
    }

    /* Accent swatch */
    .accent-variants { display: flex; gap: 10px; flex-wrap: wrap; }
    .accent-swatch {
      width: 88px;
      background: var(--node-bg);
      border: 1.5px solid var(--node-border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      box-shadow: 0 3px 8px rgba(0,0,0,0.35);
    }
    .accent-swatch-bar { height: 3px; }
    .accent-swatch-body { padding: 7px 9px; }

    /* External card label */
    .ext-label {
      font-size: 10px;
      color: var(--overlay0);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    /* ── Animation classes ── */
    @keyframes accentGrow    { from { transform: scaleX(0) } to { transform: scaleX(1) } }
    @keyframes titleReveal   { from { clip-path: inset(110% 0 0 0); transform: translateY(8px); opacity: 0 } to { clip-path: inset(0% 0 0 0); transform: translateY(0); opacity: 1 } }
    @keyframes fadeSlideUp   { from { opacity: 0; transform: translateY(5px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes cardEntrance  { from { opacity: 0; transform: scale(.97) translateY(10px) } to { opacity: 1; transform: scale(1) translateY(0) } }

    .anim-card-wrap      { animation: cardEntrance 0.42s cubic-bezier(0.16,1,0.3,1) both; }
    .anim-accent-bar     { transform-origin: left center; animation: accentGrow 0.32s cubic-bezier(0.16,1,0.3,1) 0.04s both; }
    .anim-title          { animation: titleReveal 0.4s cubic-bezier(0.16,1,0.3,1) 0.1s both; }
    .anim-uuid           { animation: fadeSlideUp 0.3s ease 0.25s both; }
    .anim-desc           { animation: fadeSlideUp 0.3s ease 0.35s both; }
    .anim-port           { animation: fadeSlideUp 0.26s ease calc(0.43s + var(--pi,0) * 0.07s) both; }

    /* Timing diagram */
    .timing-row { display: flex; margin-bottom: 28px; max-width: 480px; }
    .timing-step {
      flex: 1;
      text-align: center;
      padding: 7px 4px 5px;
      border-top: 2px solid var(--bg-surface0);
      font-size: 10px;
      color: var(--overlay1);
      position: relative;
    }
    .timing-step::before {
      content: '';
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--bg-surface1); border: 1.5px solid var(--overlay0);
      position: absolute; top: -5px; left: 50%;
      transform: translateX(-50%);
    }
    .timing-step b { display: block; font-weight: 600; color: var(--subtext0); margin-bottom: 2px; }
    .timing-step--accent::before  { border-color: var(--blue);    }
    .timing-step--title::before   { border-color: var(--lavender); }
    .timing-step--uuid::before    { border-color: var(--teal);    }
    .timing-step--desc::before    { border-color: var(--green);   }
    .timing-step--ports::before   { border-color: var(--peach);   }

    .replay-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 6px 14px;
      border-radius: var(--radius-sm);
      background: rgba(137,180,250,0.08);
      color: var(--blue);
      border: 1px solid rgba(137,180,250,0.2);
      cursor: pointer; margin-bottom: 24px;
      font-family: inherit;
      transition: background .15s, border-color .15s;
    }
    .replay-btn:hover { background: rgba(137,180,250,0.15); border-color: rgba(137,180,250,0.35); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useCallback } = React;

/* ── Design tokens ──────────────────────────────────────────────────────── */
const ACCENTS = ['#89b4fa','#b4befe','#94e2d5','#a6e3a1','#f9e2af','#fab387','#f38ba8'];
const ACCENT_NAMES = ['Blue','Lavender','Teal','Green','Yellow','Peach','Red'];

/* ── State badge ────────────────────────────────────────────────────────── */
function StateBadge({ state }) {
  const cfg = {
    default:  { label:'Default',  bg:'rgba(69,71,90,.4)',       c:'var(--overlay2)', b:'var(--bg-surface0)' },
    selected: { label:'Selected', bg:'rgba(137,180,250,.1)',    c:'var(--blue)',     b:'rgba(137,180,250,.3)' },
    modified: { label:'Modified', bg:'rgba(249,226,175,.1)',    c:'var(--yellow)',   b:'rgba(249,226,175,.25)' },
    error:    { label:'Error',    bg:'rgba(243,139,168,.1)',     c:'var(--red)',      b:'rgba(243,139,168,.25)' },
  };
  const s = cfg[state] || cfg.default;
  return (
    <div style={{ display:'inline-flex', alignItems:'center', gap:5, fontSize:10, fontWeight:600,
      letterSpacing:'0.08em', textTransform:'uppercase', padding:'3px 9px', borderRadius:20,
      background:s.bg, color:s.c, border:`1px solid ${s.b}`, marginBottom:16 }}>
      <div style={{ width:6, height:6, borderRadius:'50%', background:'currentColor' }} />
      {s.label}
    </div>
  );
}

/* ── Port handle ────────────────────────────────────────────────────────── */
function PortHandle({ side, color, handleRef }) {
  const offset = -7;
  return (
    <div
      ref={handleRef}
      style={{
        width:12, height:12, borderRadius:'50%',
        background:'var(--bg-surface0)',
        border:`1.5px solid ${color || 'var(--overlay0)'}`,
        position:'absolute',
        [side === 'left' ? 'left' : 'right']: offset,
        top:'50%', transform:'translateY(-50%)',
        flexShrink:0,
        transition:'border-color .15s, background .15s',
      }}
    />
  );
}

/* ── Module-level handle (description row) ──────────────────────────────── */
function ModuleHandle({ side, color, handleRef }) {
  return (
    <div
      ref={handleRef}
      style={{
        width:14, height:14, borderRadius:'50%',
        background:'var(--bg-surface0)',
        border:`2px solid ${color || 'var(--overlay1)'}`,
        position:'absolute',
        [side === 'left' ? 'left' : 'right']: -8,
        top:'50%', transform:'translateY(-50%)',
        flexShrink:0,
      }}
    />
  );
}

/* ── Port row ───────────────────────────────────────────────────────────── */
function PortRow({ name, hasLeft, hasRight, isLast, leftRef, rightRef, accent }) {
  return (
    <div style={{
      display:'flex', alignItems:'center', padding:'5px 18px',
      position:'relative', minHeight:30,
      borderBottom: isLast ? 'none' : '1px solid rgba(69,71,90,0.3)',
    }}>
      {hasLeft && <PortHandle side="left" handleRef={leftRef} />}
      {hasLeft && (
        <span style={{ fontSize:12, color:'var(--subtext0)', fontWeight:500, marginLeft:4 }}>
          {name}
        </span>
      )}
      {!hasLeft && hasRight && (
        <span style={{ fontSize:12, color:'var(--subtext0)', fontWeight:500, marginLeft:'auto', marginRight:4 }}>
          {name}
        </span>
      )}
      {hasLeft && hasRight && <span style={{ flex:1 }} />}
      {hasRight && <PortHandle side="right" handleRef={rightRef} />}
    </div>
  );
}

/* ── Primary card ───────────────────────────────────────────────────────── */
function PrimaryCard({
  name, uuid, description, accentColor,
  submodulePorts, hasModuleIncoming, hasModuleOutgoing,
  cardState, onToggleSelect,
  moduleInHandleRef, moduleOutHandleRef,
  animated, animKey,
}) {
  const isSelected = cardState === 'selected';
  const isModified = cardState === 'modified';
  const isError    = cardState === 'error';

  let borderColor = 'var(--node-border)';
  let boxShadow   = 'var(--shadow-md)';
  let cardBg      = 'var(--node-bg)';

  if (isSelected) {
    borderColor = 'var(--node-selected)';
    boxShadow   = 'var(--shadow-md), 0 0 0 1px var(--node-selected), 0 0 18px var(--blue-glow-md)';
  } else if (isModified) {
    borderColor = 'var(--yellow)';
    boxShadow   = 'var(--shadow-md), 0 0 0 1px rgba(249,226,175,.32), 0 0 14px rgba(249,226,175,.1)';
  } else if (isError) {
    borderColor = 'var(--red)';
    boxShadow   = 'var(--shadow-md), 0 0 0 1px rgba(243,139,168,.32), 0 0 14px rgba(243,139,168,.08)';
    cardBg      = 'color-mix(in srgb, var(--node-bg) 94%, #f38ba8 6%)';
  }

  const headerGrad = `linear-gradient(to bottom, ${accentColor}1a 0%, ${accentColor}00 100%)`;
  const hasPorts   = submodulePorts && submodulePorts.length > 0;

  return (
    <div
      key={animated ? animKey : undefined}
      onClick={onToggleSelect}
      className={animated ? 'anim-card-wrap' : undefined}
      style={{
        width:360,
        background:cardBg,
        border:`1.5px solid ${borderColor}`,
        borderRadius:'var(--radius-md)',
        boxShadow,
        position:'relative', overflow:'visible',
        cursor:'pointer', userSelect:'none',
        transition:'border-color .15s, box-shadow .15s',
      }}
    >
      {/* Accent bar */}
      <div
        className={animated ? 'anim-accent-bar' : undefined}
        style={{ height:3, borderRadius:'9px 9px 0 0', background:accentColor, width:'100%' }}
      />

      {/* Header */}
      <div style={{ padding:'12px 16px 11px', background:headerGrad }}>
        <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:8 }}>
          <div style={{ overflow:'hidden', flex:1 }}>
            <div
              className={animated ? 'anim-title' : undefined}
              style={{ fontSize:18, fontWeight:700, color:'var(--text)', lineHeight:1.2, letterSpacing:'-0.01em' }}
            >
              {name}
            </div>
            <div
              className={animated ? 'anim-uuid' : undefined}
              style={{
                fontFamily:"'SF Mono','Cascadia Code','Fira Code',monospace",
                fontSize:10, color:'var(--overlay0)', marginTop:3, letterSpacing:'0.04em',
              }}
            >
              {uuid}
            </div>
          </div>
          <button
            onClick={e => e.stopPropagation()}
            style={{
              flexShrink:0, width:24, height:24, borderRadius:'var(--radius-xs)',
              background:'transparent', border:'1px solid var(--bg-surface0)',
              display:'flex', alignItems:'center', justifyContent:'center',
              cursor:'pointer', color:'var(--overlay1)', fontSize:12, marginTop:1,
              fontFamily:'inherit', transition:'background .1s, color .1s',
            }}
            title="Drill into module"
          >
            ↗
          </button>
        </div>
      </div>

      {/* Divider */}
      <div style={{ height:1, background:'var(--bg-surface0)' }} />

      {/* Description section */}
      <div
        className={animated ? 'anim-desc' : undefined}
        style={{ padding:'12px 18px', position:'relative', minHeight:52, display:'flex', alignItems:'center' }}
      >
        {hasModuleIncoming && <ModuleHandle side="left" handleRef={moduleInHandleRef} />}
        <span style={{ fontSize:12.5, lineHeight:1.65, color:'var(--subtext1)', flex:1 }}>
          {description}
        </span>
        {hasModuleOutgoing && <ModuleHandle side="right" handleRef={moduleOutHandleRef} />}
      </div>

      {/* Port section */}
      {hasPorts && (
        <>
          <div style={{ height:1, background:'var(--bg-surface0)' }} />
          <div style={{ padding:'2px 0 4px', position:'relative' }}>
            {submodulePorts.map((port, i) => (
              <div
                key={i}
                className={animated ? 'anim-port' : undefined}
                style={animated ? { '--pi': i } : {}}
              >
                <PortRow
                  {...port}
                  isLast={i === submodulePorts.length - 1}
                />
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

/* ── External reference card ────────────────────────────────────────────── */
function ExternalCard({ name, uuid, handleSide, selected, onToggle }) {
  return (
    <div
      onClick={onToggle}
      style={{
        width:172, background:'var(--bg-mantle)',
        border:`1.5px solid ${selected ? 'var(--node-selected)' : 'var(--node-border)'}`,
        borderRadius:'var(--radius-sm)',
        boxShadow: selected
          ? '0 4px 12px rgba(0,0,0,.4), 0 0 10px var(--blue-glow-sm)'
          : '0 3px 10px rgba(0,0,0,.35)',
        position:'relative', cursor:'pointer', userSelect:'none',
        transition:'border-color .15s, box-shadow .15s',
      }}
    >
      <div style={{ padding:'10px 12px' }}>
        <div style={{ fontSize:13, fontWeight:600, color:'var(--subtext1)', lineHeight:1.3 }}>{name}</div>
        <div style={{
          fontFamily:"'SF Mono','Cascadia Code','Fira Code',monospace",
          fontSize:10, color:'var(--overlay0)', marginTop:3, letterSpacing:'0.04em',
        }}>{uuid}</div>
      </div>
      {/* Handle circle */}
      <div style={{
        width:12, height:12, borderRadius:'50%',
        background:'var(--bg-surface0)',
        border:'1.5px solid var(--overlay1)',
        position:'absolute',
        [handleSide]: -7,
        top:'50%', transform:'translateY(-50%)',
      }} />
    </div>
  );
}

/* ── Mock data ──────────────────────────────────────────────────────────── */
const MOCK = {
  name: 'GUI',
  uuid: 'a3f9c201',
  description: 'Cross-platform visual canvas for navigating the ArchUI knowledge base as an interactive node graph.',
  accentColor: ACCENTS[0],
  submodulePorts: [
    { name:'Canvas',     hasLeft:false, hasRight:true  },
    { name:'Navigation', hasLeft:true,  hasRight:false },
    { name:'Components', hasLeft:true,  hasRight:true  },
  ],
  hasModuleIncoming: true,
  hasModuleOutgoing: true,
};

/* ── Animation section ──────────────────────────────────────────────────── */
function AnimSection() {
  const [key, setKey] = useState(0);
  return (
    <div className="section">
      <div className="section-label">9 — Animation · Title Reveal</div>

      <div className="timing-row">
        {[
          { cls:'accent',  label:'Accent bar',  ms:'50ms → 370ms' },
          { cls:'title',   label:'Title',        ms:'100ms → 520ms' },
          { cls:'uuid',    label:'UUID',          ms:'250ms → 580ms' },
          { cls:'desc',    label:'Description',  ms:'350ms → 680ms' },
          { cls:'ports',   label:'Ports',         ms:'430ms+ stagger' },
        ].map(s => (
          <div key={s.cls} className={`timing-step timing-step--${s.cls}`}>
            <b>{s.label}</b>{s.ms}
          </div>
        ))}
      </div>

      <button className="replay-btn" onClick={() => setKey(k => k + 1)}>
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
          <path d="M10.5 6A4.5 4.5 0 1 1 6 1.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
          <path d="M6 1.5L8.5 1.5L8.5 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
        Replay animation
      </button>

      <div className="cards-row" key={key}>
        <PrimaryCard {...MOCK} animated animKey={key}
          accentColor="#89b4fa" cardState="default" />
        <PrimaryCard
          name="UUID System" uuid="e9d30b56" animated animKey={key}
          description="Generates, validates, and resolves stable UUIDs used for cross-module linking."
          accentColor="#94e2d5"
          submodulePorts={[
            { name:'Generator', hasLeft:false, hasRight:true },
            { name:'Resolver',  hasLeft:true,  hasRight:true },
          ]}
          hasModuleIncoming={false} hasModuleOutgoing={true}
          cardState="default"
        />
      </div>
    </div>
  );
}

/* ── App ────────────────────────────────────────────────────────────────── */
function App() {
  const [sel, setSel] = useState(new Set());
  const toggle = id => setSel(p => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const state  = (id, forced) => forced || (sel.has(id) ? 'selected' : 'default');

  return (
    <div className="page-content">
      {/* Page header */}
      <div style={{ marginBottom:52 }}>
        <div className="page-eyebrow">ArchUI · Component Preview</div>
        <div className="page-heading">Primary Module Card</div>
        <div className="page-sub">The focal card rendered at the centre of the canvas, representing the currently scoped module.</div>
      </div>

      {/* 1 — Default with all handles */}
      <div className="section">
        <div className="section-label">1 — Primary Card · module handles + port handles (default)</div>
        <StateBadge state="default" />
        <p className="click-hint">Click any card to toggle selected state.</p>
        <div className="cards-row">
          <PrimaryCard {...MOCK} cardState={state('d')} onToggleSelect={() => toggle('d')} />
        </div>
      </div>

      {/* 2 — Selected */}
      <div className="section">
        <div className="section-label">2 — Primary Card · Selected state</div>
        <StateBadge state="selected" />
        <div className="cards-row">
          <PrimaryCard {...MOCK}
            cardState={sel.has('s') ? 'default' : 'selected'}
            onToggleSelect={() => toggle('s')} />
        </div>
      </div>

      {/* 3 — Modified */}
      <div className="section">
        <div className="section-label">3 — Primary Card · Modified state</div>
        <StateBadge state="modified" />
        <div className="cards-row">
          <PrimaryCard {...MOCK}
            name="Canvas" uuid="537c63d3"
            description="Infinite-scroll node graph canvas with zoom, pan, and edge routing for the GUI module."
            accentColor={ACCENTS[4]}
            cardState={sel.has('m') ? 'selected' : 'modified'}
            onToggleSelect={() => toggle('m')} />
        </div>
      </div>

      {/* 4 — Error */}
      <div className="section">
        <div className="section-label">4 — Primary Card · Error state</div>
        <StateBadge state="error" />
        <div className="cards-row">
          <PrimaryCard {...MOCK}
            name="Navigation" uuid="f4c89a17"
            description="Breadcrumb and history stack for drilling into and back out of module hierarchies."
            accentColor={ACCENTS[6]}
            submodulePorts={[
              { name:'History',    hasLeft:true,  hasRight:false },
              { name:'Bookmarks',  hasLeft:false, hasRight:true  },
            ]}
            hasModuleIncoming={true} hasModuleOutgoing={false}
            cardState={sel.has('e') ? 'selected' : 'error'}
            onToggleSelect={() => toggle('e')} />
        </div>
      </div>

      {/* 5 — External cards */}
      <div className="section">
        <div className="section-label">5 — External Reference Card · variants</div>
        <p className="click-hint">External cards are smaller and use a grab cursor on canvas.</p>
        <div className="cards-row" style={{ alignItems:'center' }}>
          {[
            { id:'ec1', name:'CLI',        uuid:'b8e2d415', side:'right', label:'Incoming link (handle right)' },
            { id:'ec2', name:'Core',       uuid:'c1f0a392', side:'left',  label:'Outgoing link (handle left)' },
            { id:'ec3', name:'UUID System',uuid:'e9d30b56', side:'left',  label:'Selected' },
          ].map(c => (
            <div key={c.id}>
              <div className="ext-label">{c.label}</div>
              <ExternalCard name={c.name} uuid={c.uuid} handleSide={c.side}
                selected={c.id === 'ec3' ? !sel.has(c.id) : sel.has(c.id)}
                onToggle={() => toggle(c.id)} />
            </div>
          ))}
        </div>
      </div>

      {/* 6 — Accent palette */}
      <div className="section">
        <div className="section-label">6 — Accent colour variants (index 0–6)</div>
        <div className="accent-variants">
          {ACCENTS.map((c, i) => (
            <div key={i} className="accent-swatch">
              <div className="accent-swatch-bar" style={{ background:c }} />
              <div className="accent-swatch-body">
                <div style={{ color:c, fontWeight:600, fontSize:11 }}>{ACCENT_NAMES[i]}</div>
                <div style={{ color:'var(--overlay0)', fontSize:9, marginTop:2, fontFamily:'monospace' }}>{c}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* 7 — Module-level links only */}
      <div className="section">
        <div className="section-label">7 — Primary Card · module-level links only (no ports)</div>
        <div className="cards-row">
          <PrimaryCard
            name="Components" uuid="88cc4d02"
            description="Library of reusable UI primitives used across all GUI canvas views and dialogs."
            accentColor={ACCENTS[2]} submodulePorts={[]}
            hasModuleIncoming={true} hasModuleOutgoing={true}
            cardState={state('np')} onToggleSelect={() => toggle('np')} />
        </div>
      </div>

      {/* 8 — Port handles only */}
      <div className="section">
        <div className="section-label">8 — Primary Card · port handles only (no module-level links)</div>
        <div className="cards-row">
          <PrimaryCard
            name="CLI" uuid="b8e2d415"
            description="Validator that checks filesystem conformance after agent modifications to ArchUI module trees."
            accentColor={ACCENTS[1]}
            submodulePorts={[
              { name:'Import Command', hasLeft:true,  hasRight:false },
              { name:'Validate',       hasLeft:false, hasRight:true  },
              { name:'Report',         hasLeft:true,  hasRight:true  },
            ]}
            hasModuleIncoming={false} hasModuleOutgoing={false}
            cardState={state('pm')} onToggleSelect={() => toggle('pm')} />
        </div>
      </div>

      {/* 9 — Animation */}
      <AnimSection />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
